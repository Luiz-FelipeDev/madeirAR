<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Furniture Customization</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="ar-overlay">
        <div id="ui-container" class="ui-layer">
            <button id="menu-toggle" class="toggle-btn glass-panel">
                <span class="material-symbols-outlined" id="toggle-icon">expand_more</span>
            </button>

            <div id="main-menu" class="menu-panel glass-panel">
                
                <h3>Bases</h3>
                <div class="options-row" id="base-options">
                    <button data-type="base" data-id="trestle_adjustable" data-cost="180">Cavalete Ajustável</button>
                    <button data-type="base" data-id="dragon" data-cost="320">Escultura</button>
                    <button data-type="base" data-id="triple" data-cost="100">Tripla</button>
                </div>

                <h3>Formato do Tampo</h3>
                <div class="options-row" id="top-category-options">
                    <button data-type="top-category" data-target="sub-rectangular">Retangular</button>
                    <button data-type="top-category" data-target="sub-round">Redondo</button>
                </div>

                <!-- Sub-menus -->
                <div id="sub-rectangular" class="sub-options-container hidden">
                    <h3>Variações Retangulares</h3>
                    <div class="options-row">
                        <button data-type="top" data-id="rectangular_standard" data-cost="200">Padrão</button>
                        <button data-type="top" data-id="rectangular_rounded" data-cost="220">Canto Redondo</button>
                        <button data-type="top" data-id="rectangular_organic" data-cost="350">Borda Orgânica</button>
                    </div>
                </div>

                <div id="sub-round" class="sub-options-container hidden">
                    <h3>Variações Redondas</h3>
                    <div class="options-row">
                        <button data-type="top" data-id="round_standard" data-cost="250">Padrão</button>
                        <button data-type="top" data-id="round_bevel" data-cost="280">Chanfrado</button>
                        <button data-type="top" data-id="glass" data-cost="400">Vidro</button>
                    </div>
                </div>

                <h3>Acabamento</h3>
                <div class="options-row texture-scroll" id="texture-options">
                    <button class="texture-btn" data-type="texture" data-id="pinus" data-multiplier="1" style="background-image: url('assets/textures/pinus.jpg');" aria-label="Pinus"></button>
                    
                    <button class="texture-btn" data-type="texture" data-id="oak" data-multiplier="1.5" style="background-image: url('assets/textures/oak.jpg');" aria-label="Carvalho"></button>
                    
                    <button class="texture-btn" data-type="texture" data-id="mdf" data-multiplier="0.8" style="background-image: url('assets/textures/mdf.jpg');" aria-label="MDF"></button>

                    <button class="texture-btn" data-type="texture" data-id="mahogany" data-multiplier="2.0" style="background-image: url('assets/textures/mahogany.jpg');" aria-label="Mogno"></button>

                    <button class="texture-btn" data-type="texture" data-id="walnut" data-multiplier="1.8" style="background-image: url('assets/textures/walnut.jpg');" aria-label="Nogueira"></button>
                </div>
                
                <h3>Decorações</h3>
                <div class="options-row texture-scroll" id="decoration-options">
                    <button class="texture-btn decoration-btn" data-type="decoration" data-id="2_ducks_wood" style="background-image: url('assets/previews/2_ducks_wood.jpg');" aria-label="Patinhos"></button>
                    <button class="texture-btn decoration-btn" data-type="decoration" data-id="santa_painted_wooden_statue" style="background-image: url('assets/previews/santa_painted_wooden_statue.jpg');" aria-label="Statua"></button>
                    <button class="texture-btn decoration-btn" data-type="decoration" data-id="christmas_decoration_small_table_tree" style="background-image: url('assets/previews/christmas_decoration_small_table_tree.jpg');" aria-label="Árvore de Natal"></button>
                </div>              

                <div class="checkout-container">
                    <span id="total-price">R$ 0,00</span>
                    <button id="btn-checkout" class="action-btn">
                        <span class="material-symbols-outlined">send</span> Solicitar
                    </button>
                </div>
            </div>
        </div>

        <div id="gap-control-container" class="hidden">
            <span class="material-symbols-outlined">straighten</span>
            <input type="range" id="trestle-gap-slider" min="0.8" max="2.5" step="0.1" value="1.5">
            <span id="gap-value-display">1.5m</span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
